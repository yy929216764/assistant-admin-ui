<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="loadGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>

  <!-- 外圈 -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#e0e0e0" stroke-width="6"/>

  <!-- 动画圈 -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#loadGradient)" stroke-width="6"
          stroke-linecap="round" stroke-dasharray="180 251">
    <animateTransform attributeName="transform" type="rotate"
                      from="0 50 50" to="360 50 50" dur="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 中心书本图标 -->
  <g transform="translate(50, 50)">
    <path d="M-10 -2 Q-5 -5 0 -2 L0 8 Q-5 5 -10 8 Z" fill="url(#loadGradient)"/>
    <path d="M10 -2 Q5 -5 0 -2 L0 8 Q5 5 10 8 Z" fill="url(#loadGradient)"/>
  </g>
</svg>