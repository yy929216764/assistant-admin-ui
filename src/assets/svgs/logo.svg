<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 背景圆形 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#667eea" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 外圆 -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)" filter="url(#shadow)"/>

  <!-- 打开的书本 -->
  <g transform="translate(100, 100)">
    <!-- 左页 -->
    <path d="M-50 -20 Q-25 -35 0 -20 L0 40 Q-25 25 -50 40 Z" fill="url(#bookGradient)"/>
    <!-- 右页 -->
    <path d="M50 -20 Q25 -35 0 -20 L0 40 Q25 25 50 40 Z" fill="url(#bookGradient)"/>
    <!-- 书脊 -->
    <line x1="0" y1="-20" x2="0" y2="40" stroke="#667eea" stroke-width="2"/>
    <!-- 文字线条 -->
    <line x1="-40" y1="-5" x2="-10" y2="-5" stroke="#667eea" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="-40" y1="10" x2="-10" y2="10" stroke="#667eea" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="10" y1="-5" x2="40" y2="-5" stroke="#667eea" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="10" y1="10" x2="40" y2="10" stroke="#667eea" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- AI大脑图标 -->
  <g transform="translate(100, 55)">
    <!-- 大脑轮廓 -->
    <ellipse cx="0" cy="0" rx="25" ry="20" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <!-- 大脑纹理 -->
    <path d="M-15 -5 Q-8 -12 0 -5 Q8 -12 15 -5" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <path d="M-18 5 Q-10 0 -5 5 Q0 10 5 5 Q10 0 18 5" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <!-- 神经元节点 -->
    <circle cx="-12" cy="-3" r="2" fill="#ffffff"/>
    <circle cx="12" cy="-3" r="2" fill="#ffffff"/>
    <circle cx="0" cy="8" r="2" fill="#ffffff"/>
    <!-- 连接线 -->
    <line x1="-12" y1="-3" x2="0" y2="8" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
    <line x1="12" y1="-3" x2="0" y2="8" stroke="#ffffff" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- 装饰圆点 -->
  <circle cx="35" cy="50" r="4" fill="#ffffff" opacity="0.4"/>
  <circle cx="165" cy="150" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="155" cy="45" r="2" fill="#ffffff" opacity="0.5"/>
</svg>