<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 学生头像 - 蓝色调 -->
  <defs>
    <linearGradient id="studentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="studentGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d8bfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d4fe;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="url(#studentGrad)" stroke="#e0e0e0" stroke-width="2"/>

  <!-- 学生帽子 - 学位帽 -->
  <path d="M50 18 L25 30 L50 42 L75 30 Z" fill="#fff"/>
  <path d="M25 30 L25 45 L50 57 L75 45 L75 30" fill="none" stroke="#fff" stroke-width="2"/>
  <ellipse cx="50" cy="42" rx="25" ry="8" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- 流苏 -->
  <line x1="75" y1="30" x2="75" y2="50" stroke="#fff" stroke-width="2"/>
  <circle cx="75" cy="52" r="3" fill="#ffd700"/>

  <!-- 人脸轮廓 -->
  <ellipse cx="50" cy="65" rx="18" ry="20" fill="#ffe0bd"/>

  <!-- 眼睛 -->
  <circle cx="43" cy="62" r="2.5" fill="#333"/>
  <circle cx="57" cy="62" r="2.5" fill="#333"/>

  <!-- 微笑 -->
  <path d="M44 72 Q50 76 56 72" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>

  <!-- 书本装饰 -->
  <rect x="35" y="78" width="30" height="8" rx="1" fill="#fff" opacity="0.9"/>
  <line x1="50" y1="78" x2="50" y2="86" stroke="#4facfe" stroke-width="1"/>
</svg>
