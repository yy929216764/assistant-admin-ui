<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="avatarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="url(#avatarBg)"/>

  <!-- 用户轮廓 -->
  <g transform="translate(50, 50)" fill="#ffffff">
    <!-- 头部 -->
    <circle cx="0" cy="-10" r="18" opacity="0.9"/>
    <!-- 身体 -->
    <ellipse cx="0" cy="25" rx="28" ry="22" opacity="0.9"/>
  </g>

  <!-- 装饰 -->
  <circle cx="75" cy="25" r="3" fill="#ffffff" opacity="0.3"/>
  <circle cx="20" cy="75" r="2" fill="#ffffff" opacity="0.2"/>
</svg>